spring.application.name=main_el
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fault_detection;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true


spring.mvc.async.request-timeout=PT10M

# Groq LLM API key for report generation
groq.api.key=YOUR_GROQ_API_KEY_HERE

# Seed data initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
